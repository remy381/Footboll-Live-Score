<!DOCTYPE html>
<html lang="de">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ESP32-C3 Fußball-Score Flasher</title>
   <style>
       body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding: 50px; }
       .card { background: #1e1e1e; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
       h1 { color: #4CAF50; }
       p { color: #bbb; max-width: 400px; margin: 20px auto; }
       esp-web-install-button { margin-top: 20px; display: block; }
   </style>
   <!-- Lädt das offizielle ESP-Web-Tools Skript -->
   <script type="module" src="https://unpkg.com"></script>
</head>
<body>

   <div class="card">
       <h1>⚽ Live-Score Display</h1>
       <p>Verbinde deinen ESP32-C3 per USB-Kabel mit dem PC/Laptop (Nutze Chrome oder Edge Browser).</p>
       
       <!-- Der magische Button -->
       <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
   </div>

</body>
</html>
